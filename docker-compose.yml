services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      additional_contexts:
        - fl-node-orm=./fl-node-orm
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - FL_ROOT=/data
    volumes:
      - ${FL_ROOT:?Set FL_ROOT to your Freelancer install path}:/data:ro

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      additional_contexts:
        - fl-node-orm=./fl-node-orm
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    ports:
      - "8080:80"
    depends_on:
      - api
